databases:
  - name: saas-integral-db
    databaseName: saas_integral_gestion_operativa
    user: saas_integral_user

services:
  - type: web
    name: saas-integral-backend
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/openapi.json
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saas-integral-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: SUPERADMIN_EMAIL
        value: superadmin@saasintegral.com
      - key: SUPERADMIN_PASSWORD
        generateValue: true
      - key: SUPERADMIN_TENANT_SLUG
        value: platform
      - key: CORS_ALLOWED_ORIGINS
        sync: false
