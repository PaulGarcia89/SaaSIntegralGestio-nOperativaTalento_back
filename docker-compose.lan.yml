services:
  postgres:
    image: postgres:18
    container_name: saas_integral_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_integral_gestion_operativa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SystemRoot_1
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_integral_gestion_operativa"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_integral_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://postgres:SystemRoot_1@postgres:5432/saas_integral_gestion_operativa?schema=public
      JWT_ACCESS_SECRET: 40fac418579d60cb58e5a7dfaf5ab2cbeac84c890247fece1e58ab2dcac5f291
      JWT_REFRESH_SECRET: 9904ecbcfc25418d73b3f7e8065b47edaccb6a066547d009029da14746c7bf62
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      SUPERADMIN_EMAIL: superadmin@saasintegral.com
      SUPERADMIN_PASSWORD: 3mNJlb7KLQincjn2SDsqBYn9K+aPVL1B
      SUPERADMIN_TENANT_SLUG: platform
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
    expose:
      - "3000"

  frontend:
    build:
      context: ../FrontEnd/frontend-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: saas_integral_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
    expose:
      - "3001"

  gateway:
    image: nginx:1.27-alpine
    container_name: saas_integral_gateway
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.lan.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
